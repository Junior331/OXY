# Produção — Docker Compose
# Uso:
#   Local:  docker compose -f docker/docker-compose.prod.yml up -d --build
#   AWS:    ./scripts/pull-ssm-env.sh && docker compose -f docker/docker-compose.prod.yml up -d --build

services:

  backend:
    build:
      context: ../backend/api-node
      dockerfile: Dockerfile.prod
    container_name: clinica-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - ../.env
    volumes:
      - baileys_sessions:/app/sessions
    depends_on:
      - redis
    networks:
      - clinica-network

  ai-service:
    build:
      context: ../backend/ai-service
      dockerfile: Dockerfile.prod
    container_name: clinica-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - redis
    networks:
      - clinica-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    container_name: clinica-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - clinica-network

  redis:
    image: redis:7-alpine
    container_name: clinica-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    env_file:
      - ../.env
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-server --requirepass $$REDIS_PASSWORD; else redis-server; fi"
    volumes:
      - redis_data:/data
    networks:
      - clinica-network

volumes:
  redis_data:
  baileys_sessions:

networks:
  clinica-network:
    driver: bridge
    name: clinica-network
